<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><meta name="description" content="Share your photos and take a look at other peoples photos on our social media web application"/><meta name="author" content="Emmanuel Gutierrez"/><meta name="keywords" content="social media, photos, share"/><title>Spots</title><link rel="icon" href="favicon.ico"><script defer="defer" src="main.js"></script><link href="main.css" rel="stylesheet"></head><body><div class="page"><header class="header"><img src="8650253b58b46f0f1c06.svg" alt="Spots Logo" class="header__logo"/></header><main class="content"><section class="profile page__section"><div class="profile__customization"><div class="profile__avatar-wrap"><button class="profile__edit-avatar-btn"><img src="466fba40d06de23ed0a1.svg" alt="Light Pencil Icon" class="Profile__pencil-light"/></button> <img src="2fc47fd8e9a9bcd9612f.jpg" alt="Personal Avatar" class="profile__avatar"/></div><div class="profile__information"><div class="profile__name-and-bio"><h1 class="profile__name">Bessie Coleman</h1><p class="profile__bio">Civil Aviator</p></div><button class="profile__edit-button-layout" type="button"><img src="1ecf96fab54a91c898b4.svg" alt="Edit Profile Button" class="profile__edit-button"/> Edit Profile</button></div></div><button class="profile__new-post-button" type="button"><img src="40608da7369d39bc1077.svg" alt="Plus sign" class="profile__plus-button-image"/> New Post</button></section><section class="cards page__section"><ul class="cards__list"></ul></section></main><footer class="footer page__section"><p class="footer__copyright">2025 © Emmanuel Gutierrez</p></footer></div><div class="modal" id="edit-profile-modal"><div class="modal__container"><div class="modal__row"><h2 class="modal__title">Edit profile</h2><button class="modal__exit-icon" type="button"></button></div><form class="modal__form" id="form-profile"><fieldset class="modal__form-profile"><div class="modal__form-input-wrap modal-overlay"><label for="full__name" class="modal__form-label">Name</label> <input class="modal__form-input" placeholder="Type your name" id="full__name" required minlength="2" maxlength="40"/> <span class="modal__input-error" id="full__name-error"></span></div><div class="modal__form-input-wrap"><label for="form-description" class="modal__form-label">Description</label> <input class="modal__form-input" id="form__description" placeholder="Describe yourself" required minlength="2" maxlength="200"/> <span class="modal__input-error" id="form__description-error"></span></div><button class="modal__form-button" type="submit">Save</button></fieldset></form></div></div><div class="modal" id="new-post-modal"><div class="modal__container"><div class="modal__row"><h2 class="modal__title">New post</h2><button class="modal__exit-icon" type="button"></button></div><form class="modal__form" id="form-post"><fieldset class="modal__form-profile"><div class="modal__form-container"><div class="modal__form-input-wrap"><label for="image-link" class="modal__form-label">Image link</label> <input type="url" class="modal__form-input" placeholder="Paste a link to the picture" id="image__link" required/> <span class="modal__input-error" id="image__link-error"></span></div><div class="modal__form-input-wrap"><label for="caption" class="modal__form-label">Caption</label> <input class="modal__form-input" id="caption" placeholder="Type your caption" required minlength="2" maxlength="30"/> <span class="modal__input-error" id="caption-error"></span></div><button class="modal__form-button" type="submit">Save</button></div></fieldset></form></div></div><div class="modal modal_type_preview" id="modal__preview"><div class="modal__preview-wrap modal-overlay"><button class="modal__preview-button"><img src="#" alt="#" class="modal__preview-img"/></button> <button class="modal__preview-exit-button"><img src="8fd62550d2f8a12ff952.svg" alt="White X" class="modal__preview-exit-icon"/></button><p class="modal__preview-caption"></p></div></div><div class="modal" id="delete-modal"><div class="modal__container modal__del-container"><div class="modal__row"><h2 class="modal__title modal__title-del">Are you sure you want to delete this image?</h2><button class="modal__exit-icon modal__del-exit-icon" type="button"></button></div><form class="modal__form" id="delete-post"><fieldset class="modal__form-profile modal__button-wrap"><button class="modal__form-button modal__delete-button" type="submit">Delete</button> <button class="modal__form-button modal__cancel-button" type="button">Cancel</button></fieldset></form></div></div><div class="modal" id="edit-avatar-modal"><div class="modal__container"><div class="modal__row"><h2 class="modal__title">Edit profile avatar</h2><button class="modal__exit-icon" type="button"></button></div><form class="modal__form" id="form-avatar"><fieldset class="modal__form-avatar"><div class="modal__form-container"><div class="modal__form-input-wrap"><label for="image-link" class="modal__form-label">Profile Picture</label> <input type="url" class="modal__form-input" placeholder="Paste a link to an image" id="avatar__link" required/> <span class="modal__input-error" id="avatar__link-error"></span></div><button class="modal__form-button" type="submit">Save</button></div></fieldset></form></div></div><template id="card-template"><li class="card"><button class="card__delete-button" type="button"><img src="96a4802ce760f37f1ce4.svg" alt="Delete button" class="card__delete-img"/></button> <button class="card__img-button"><img class="card__image" src="#" alt="#"/></button><div class="card__ui"><h2 class="card__description"></h2><button class="card__button" type="button"></button></div></li></template></body></html>
